name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'book/**'
      - 'docs/**'
      - '*.md'
      - '.arcanea/lore/**'
      - '.arcanea/projects/log/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'book/**'
      - 'docs/**'
      - '*.md'
      - '.arcanea/lore/**'
      - '.arcanea/projects/log/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '8.15.0'

jobs:
  # ============================================
  # INSTALL — shared dependency install step
  # ============================================
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache node_modules
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

  # ============================================
  # LINT — fast feedback
  # ============================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Reject npm usage in scripts
        run: |
          # Flag repo-level npm usage (not global installs, not comments/docs/shell utilities)
          HITS=$(grep -rn "^\s*npm install\|^\s*npm ci\|^\s*npm run" scripts/ .github/ 2>/dev/null | grep -v "npx\|node_modules\|.md\|pnpm\|echo\|#\|//\|log\.\|console\.\|npm install -g\|\.sh:" | head -5 || true)
          if [ -n "$HITS" ]; then
            echo "$HITS"
            echo "::error::Found npm usage — use pnpm only (Execution Law)"
            exit 1
          fi
          echo "No npm usage found — pnpm discipline enforced"

      - name: Verify .nvmrc matches CI
        run: |
          if [ -f .nvmrc ]; then
            NVMRC_VER=$(cat .nvmrc | tr -d '[:space:]')
            if [ "$NVMRC_VER" != "${{ env.NODE_VERSION }}" ]; then
              echo "::error::.nvmrc ($NVMRC_VER) != CI Node (${{ env.NODE_VERSION }})"
              exit 1
            fi
          fi

      - name: ESLint
        run: cd apps/web && npx next lint
        continue-on-error: true

      - name: Prettier check
        run: pnpm format:check
        continue-on-error: true

  # ============================================
  # TYPECHECK — report errors, do not block
  # ============================================
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: install
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: TypeScript check
        run: |
          cd apps/web
          npx tsc --noEmit 2>&1 | tee /tmp/tsc-output.txt
          ERROR_COUNT=$(grep -c "error TS" /tmp/tsc-output.txt || echo "0")
          echo "## TypeScript Report" >> $GITHUB_STEP_SUMMARY
          echo "**Errors**: ${ERROR_COUNT}" >> $GITHUB_STEP_SUMMARY
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo "::error::TypeScript has ${ERROR_COUNT} errors — fix before merge"
            exit 1
          fi

  # ============================================
  # BUILD — production build verification
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore node_modules
        uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build web app
        run: pnpm --filter @arcanea/web build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Run package tests
        run: pnpm test:quick
        continue-on-error: true

      - name: Build summary
        if: always()
        run: |
          echo "## Build Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Build**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Node**: ${{ env.NODE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **pnpm**: ${{ env.PNPM_VERSION }}" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # STATUS — aggregate result for branch protection
  # ============================================
  ci-status:
    name: CI Status
    runs-on: ubuntu-latest
    needs: [lint, typecheck, build]
    if: always()

    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeCheck | ${{ needs.typecheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::Lint failed"
            exit 1
          fi
          if [ "${{ needs.typecheck.result }}" != "success" ]; then
            echo "::error::TypeScript check failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::Build failed"
            exit 1
          fi
          echo "CI passed (lint + typecheck + build green)"
