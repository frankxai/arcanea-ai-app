<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #09090B;
      --bg-surface: #18181B;
      --bg-card: #27272A;
      --border-subtle: #27272A;
      --border-hover: #3f3f46;
      --text-primary: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #52525B;
      --accent-teal: #7fffd4;
      --accent-violet: #8b5cf6;
      --glass-border: rgba(127, 255, 212, 0.08);
    }

    body {
      width: 280px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-size: 13px;
      letter-spacing: -0.02em;
      padding: 16px;
    }

    /* Brand header */
    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .brand h1 {
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-teal) 0%, #5eead4 50%, var(--accent-teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .brand .version {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 500;
    }

    /* Stats grid — large numbers, small labels */
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-cell {
      padding: 10px 12px;
      border-radius: 8px;
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
    }

    .stat-cell .value {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .stat-cell .label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border-subtle);
      margin-bottom: 16px;
    }

    /* Buttons */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border-hover);
      background: transparent;
      color: var(--text-primary);
      transition: all 0.15s;
      letter-spacing: -0.02em;
      font-family: inherit;
    }

    .btn:hover {
      border-color: var(--text-secondary);
      background: var(--bg-card);
    }

    .btn-primary {
      background: var(--accent-teal);
      border-color: var(--accent-teal);
      color: var(--bg-deep);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #6ee7c0;
      border-color: #6ee7c0;
    }

    /* Footer */
    .footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="brand">
    <h1>Arcanea Media</h1>
    <span class="version">v0.1.0</span>
  </div>

  <div class="stats">
    <div class="stat-cell">
      <div class="value" id="img-count">&mdash;</div>
      <div class="label">Images</div>
    </div>
    <div class="stat-cell">
      <div class="value" id="vid-count">&mdash;</div>
      <div class="label">Videos</div>
    </div>
    <div class="stat-cell">
      <div class="value" id="dl-count">&mdash;</div>
      <div class="label">Downloaded</div>
    </div>
    <div class="stat-cell">
      <div class="value" id="hd-count">&mdash;</div>
      <div class="label">HD Videos</div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="actions">
    <button class="btn btn-primary" id="btn-open-panel">Open Side Panel</button>
    <button class="btn" id="btn-scan">Quick Scan</button>
  </div>

  <div class="footer">Grok Export & Library Manager</div>
  <script src="popup.js"></script>
</body>
</html>
