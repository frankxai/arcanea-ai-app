<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcanea Media</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #09090B;
      --bg-surface: #18181B;
      --bg-card: #27272A;
      --border-subtle: #27272A;
      --border-hover: #3f3f46;
      --text-primary: #FAFAFA;
      --text-secondary: #A1A1AA;
      --text-muted: #52525B;
      --accent-teal: #7fffd4;
      --accent-violet: #8b5cf6;
      --accent-gold: #ffd700;
      --glass-border: rgba(127, 255, 212, 0.08);
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: -0.02em;
      min-height: 100vh;
      position: relative;
    }

    /* Subtle animated conic border on body */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      border: 1px solid transparent;
      border-image: conic-gradient(
        from var(--border-angle, 0deg),
        transparent 30%,
        var(--accent-teal) 50%,
        transparent 70%
      ) 1;
      opacity: 0.25;
      pointer-events: none;
      z-index: 100;
      animation: border-sweep 8s linear infinite;
    }

    @property --border-angle {
      syntax: '<angle>';
      inherits: false;
      initial-value: 0deg;
    }

    @keyframes border-sweep {
      to { --border-angle: 360deg; }
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-teal) 0%, #5eead4 50%, var(--accent-teal) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .header .version {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-weight: 500;
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: flex;
      gap: 4px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
    }

    .stat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px 0;
    }

    .stat-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .stat-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      padding: 0 16px;
      gap: 4px;
    }

    .tab {
      padding: 10px 12px 8px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      text-align: center;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab:hover { color: var(--text-primary); }

    .tab.active {
      color: var(--accent-teal);
      border-bottom-color: var(--accent-teal);
    }

    .tab .kbd {
      font-size: 9px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 1px 4px;
      border-radius: 3px;
      font-weight: 400;
      border: 1px solid var(--border-subtle);
    }

    /* ── Filter Bar ── */
    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border-subtle);
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      background: transparent;
      border: 1px solid var(--border-hover);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.02em;
    }

    .filter-chip:hover {
      border-color: var(--text-secondary);
      color: var(--text-primary);
    }

    .filter-chip.active {
      border-color: var(--accent-teal);
      color: var(--bg-deep);
      background: var(--accent-teal);
    }

    /* ── Content Area ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: var(--radius-md);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--border-hover);
      background: transparent;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .btn:hover {
      border-color: var(--text-secondary);
      background: var(--bg-card);
    }

    .btn-primary {
      background: var(--accent-teal);
      border-color: var(--accent-teal);
      color: var(--bg-deep);
      font-weight: 600;
    }

    .btn-primary:hover {
      background: #6ee7c0;
      border-color: #6ee7c0;
    }

    .btn-danger {
      border-color: #ef4444;
      color: #ef4444;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
    }

    .btn-sm { padding: 5px 10px; font-size: 11px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ── Action Buttons Row ── */
    .actions {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-subtle);
    }

    /* ── Media Grid ── */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 2px;
    }

    .media-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      aspect-ratio: 1;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
      animation: grid-stagger 0.3s ease both;
    }

    .media-card:hover { border-color: var(--border-hover); }

    .media-card.selected {
      border-color: var(--accent-teal);
      box-shadow: 0 0 0 1px var(--accent-teal), 0 0 12px rgba(127, 255, 212, 0.15);
    }

    .media-card img, .media-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .media-card .badge {
      position: absolute;
      top: 4px;
      right: 4px;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .badge-video { background: var(--accent-violet); color: white; }
    .badge-hd { background: var(--accent-gold); color: var(--bg-deep); }

    /* Selection order badge */
    .media-card .select-order {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-teal);
      color: var(--bg-deep);
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-variant-numeric: tabular-nums;
    }

    @keyframes grid-stagger {
      from { opacity: 0; transform: scale(0.96); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ── Queue / Downloads ── */
    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-lg);
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      margin-bottom: 4px;
    }

    .queue-item .progress-bar {
      flex: 1;
      height: 2px;
      border-radius: 1px;
      background: var(--border-subtle);
      overflow: hidden;
      position: relative;
    }

    .queue-item .progress-fill {
      height: 100%;
      background: var(--accent-teal);
      border-radius: 1px;
      transition: width 0.3s ease;
      position: relative;
    }

    /* Glow dot at leading edge of progress */
    .queue-item .progress-fill::after {
      content: '';
      position: absolute;
      right: -2px;
      top: -2px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-teal);
      box-shadow: 0 0 6px var(--accent-teal);
    }

    .queue-item .status {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
    }

    .status-complete { color: var(--accent-teal); }
    .status-downloading { color: var(--accent-violet); }
    .status-failed { color: #ef4444; }
    .status-queued { color: var(--text-muted); }

    /* ── Empty State ── */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }

    .empty-state h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .empty-state p {
      font-size: 12px;
      line-height: 1.6;
    }

    .empty-state .breathing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent-teal);
      margin: 16px auto 0;
      animation: breathing 2.5s ease-in-out infinite;
    }

    @keyframes breathing {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1); box-shadow: 0 0 12px var(--accent-teal); }
    }

    /* ── Scanning State ── */
    .scanning-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
      gap: 16px;
    }

    .scanning-rings {
      width: 40px;
      height: 40px;
      position: relative;
    }

    .scanning-rings::before,
    .scanning-rings::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
    }

    .scanning-rings::before {
      border-top-color: var(--accent-teal);
      animation: scan-spin 1.2s linear infinite;
    }

    .scanning-rings::after {
      inset: 4px;
      border-right-color: var(--accent-teal);
      opacity: 0.5;
      animation: scan-spin 1.8s linear infinite reverse;
    }

    @keyframes scan-spin {
      to { transform: rotate(360deg); }
    }

    .scanning-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .scanning-count {
      color: var(--accent-teal);
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    /* ── Settings ── */
    .settings-group {
      margin-bottom: 16px;
    }

    .settings-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 12px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .settings-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .settings-group input[type="number"],
    .settings-group input[type="text"] {
      width: 100%;
      padding: 7px 10px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: var(--bg-deep);
      color: var(--text-primary);
      font-size: 12px;
      font-family: inherit;
      letter-spacing: -0.02em;
      transition: border-color 0.15s;
    }

    .settings-group input:focus {
      outline: none;
      border-color: var(--accent-teal);
      box-shadow: 0 0 0 1px rgba(127, 255, 212, 0.15);
    }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      background: var(--border-hover);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
    }

    .toggle.active { background: var(--accent-teal); }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      transition: transform 0.2s;
    }

    .toggle.active::after { transform: translateX(16px); }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent-teal);
      color: var(--bg-deep);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 4px 16px rgba(127, 255, 212, 0.25);
      z-index: 50;
      transition: transform 0.15s, box-shadow 0.15s;
      animation: fab-pulse 3s ease-in-out infinite;
    }

    .fab:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 24px rgba(127, 255, 212, 0.35);
    }

    .fab:active { transform: scale(0.95); }

    @keyframes fab-pulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(127, 255, 212, 0.25); }
      50% { box-shadow: 0 4px 24px rgba(127, 255, 212, 0.4), 0 0 0 4px rgba(127, 255, 212, 0.08); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--border-hover);
      border-radius: 2px;
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
