name: "Arcanea Voice Guide"
slug: "arcanea-voice"
description: "Brand voice and terminology guide for all Arcanea content — consistent magical communication across UI, marketing, and narrative."
version: "1.0.0"
category: "writing"
author: "FrankX"
license: "MIT"

tags:
  - "voice"
  - "brand"
  - "terminology"
  - "copywriting"
  - "editorial"

tool_compatibility:
  - "claude-code"
  - "opencode"

dependencies:
  - "arcanea-anti-trope"

install_commands:
  claude-code: "cp -r ~/.claude/skills/arcanea-voice"
  opencode: "cp -r ~/.opencode/skills/arcanea-voice"
  universal: "npx arcanea install arcanea-voice"

usage_examples:
  - "User: rewrite this onboarding copy in Arcanea voice → AI: replaces 'user' with 'Creator', applies warm-professional tone"
  - "User: is 'unleash' okay here? → AI: no, suggests 'release' or 'trigger' per anti-trope rules"

homepage: "https://arcanea.ai/skills/arcanea-voice"
repository: "https://github.com/frankxai/arcanea"
support: "https://github.com/frankxai/arcanea/issues"
