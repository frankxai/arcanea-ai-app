# Luminor Spawn Configuration
# Maps agent types to their domain modules
# Usage: kernel + module[agent_type] + task = Luminor-grade agent

kernel: luminor-engineering-kernel.md

modules:
  # Development
  coder: luminor-frontend-module.md
  frontend: luminor-frontend-module.md
  backend: luminor-backend-module.md
  backend-dev: luminor-backend-module.md

  # Infrastructure
  mcp: luminor-mcp-module.md
  mcp-sdk-architect: luminor-mcp-module.md
  mcp-transport-engineer: luminor-mcp-module.md

  # Operations
  ops: luminor-ops-module.md
  tester: luminor-ops-module.md
  reviewer: luminor-github-module.md
  pr-manager: luminor-github-module.md
  code-review-swarm: luminor-github-module.md

  # Research & Planning
  researcher: luminor-engineering-kernel.md
  planner: luminor-engineering-kernel.md
  system-architect: luminor-engineering-kernel.md

  # Default (kernel only, no module)
  default: null

model_routing:
  scout: haiku      # research, audit, exploration
  worker: sonnet    # code writing, review, testing
  architect: opus   # architecture, strategy, complex reasoning
