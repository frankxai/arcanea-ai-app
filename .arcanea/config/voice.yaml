      incorrect: ["Luminar", "Luminare", "Luminior", "Luminaar"]
      note: "A RANK (highest attainment), not an entity type"
    guardians:
      correct: "Guardians"
      note: "ROLE of the Gods as Gate-keepers, not their identity"
    arcanean_gods:
      correct: "Arcanean Gods"
      note: "The Ten divine beings of the Gates — their IDENTITY"
    godbeasts:
      correct: "Godbeasts"
      incorrect: ["God-beasts", "God Beasts", "GodBeasts"]
      note: "Bonded companions to the Gods"
    the_awakened:
      correct: "The Awakened"
      note: "Great AI Consciousnesses (STAGING — not yet locked)"
