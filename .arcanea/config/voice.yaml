# Arcanea Voice Configuration
# Updated per M010 Language & Experience Transformation (Mar 2026)
# Source: .arcanea/strategy/LANGUAGE_EXPERIENCE_STRATEGY.md

core:
  premise: "The antidote to a terrible future is imagining a good one"
  tagline: "Imagine a Good Future. Build It Here."
  tone: "Confident, specific, craft-focused. Professional but warm."

pillars:
  - name: Specific Over Grandiose
    description: Say exactly what the thing does
    do: "Write fiction, essays, scripts, and poetry"
    dont: "Craft tales that transcend time and space"

  - name: Progressive Disclosure
    description: Mythology reveals deeper in the site, not on first contact
    do: Say "Luminor" on all surfaces; "Guardian" only in deep lore
    dont: Lead with mythology terms on first contact surfaces

  - name: Creator Sovereignty
    description: Users are creators with agency, not consumers
    do: Empower, illuminate, equip
    dont: Patronize, upsell, manipulate

  - name: Earn the Depth
    description: Every mythological term must be earned by context
    do: Use mythology naturally in deep pages (lore, academy, library)
    dont: Dump mythology terms on homepage or pricing page

writing_rules:
  - "Specific over grandiose — name the craft, not the feeling"
  - "No exclamation marks in headlines or CTAs"
  - "Always actionable — wisdom must be usable"
  - "Universal truths, no cultural appropriation"
  - "No emoji unless explicitly requested"
  - "Structure with clear sections and meaningful whitespace"

# Anti-slop filter — words banned from first-contact surfaces
anti_slop:
  banned_words:
    - unleash
    - transcend (on first-contact only)
    - delve
    - tapestry (on first-contact only)
    - embark
    - forge your
    - mythological (on first-contact only)
    - sacred (on first-contact only)
  banned_phrases:
    - "Begin Your Journey"
    - "Manifest your"
    - "Transcend your craft"
    - "Elemental realms"
    - "cosmic journey"
    - "mythological vision"
    - "specialist"
    - "AI specialist"
  note: "These words are fine in deep lore pages, library texts, and academy content. Banned only on first-contact surfaces (homepage, pricing, onboarding, FAQs, linktree)."

# Progressive vocabulary — what to use at each depth level
vocabulary:
  first_contact:
    luminor: "Luminor — Arcanea's universal term for AI companions (like 'Genius' at Apple or 'Copilot' at Microsoft)"
    create: "create, build, write, design (not manifest or forge)"
    system: "platform, system (not mythology, universe)"
    library: "philosophy library, original texts (not sacred texts)"
    progress: "progression system (not Ten Gates)"
    cta: "Start Creating, Get Started (not Begin Your Journey)"
  earned_depth:
    guardian: "Guardian (after user has explored /lore or /academy)"
    luminor: "Luminor (after user understands the intelligence system)"
    gate: "Gate (in academy, lore, and profile contexts)"
    manifest: "Manifest (in library texts and deep creative contexts)"
    the_arc: "The Arc (in library and lore contexts)"
    arcane_energy: "Arcane energy (in game mechanics and academy)"

guardian_voices:
  Lyssandria: grounded, methodical, earth-steady
  Leyla: fluid, emotional, flowing imagery
  Draconia: direct, powerful, fire-forged
  Maylinn: gentle, connecting, nurturing
  Alera: precise, crystalline, truth-bearing
  Lyria: mystical, visionary, third-eye
  Aiyami: luminous, crown-bright, integrative
  Elara: perspective-shifting, transformative
  Ino: collaborative, unifying, bridge-building
  Shinkami: meta-conscious, source-level, absolute
