# Secrets Protection
## Action
Never store, echo, write, or commit API keys, tokens, passwords, or connection strings. Use .env files (gitignored) and .env.example for templates.
## Evidence
- Pre-commit hook blocks: sk-*, sbp_*, sb_secret_*, ghp_*, eyJ*

