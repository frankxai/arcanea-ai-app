<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="arcGrad" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="35%" stop-color="#c4956a"/>
      <stop offset="65%" stop-color="#e8c49a"/>
      <stop offset="100%" stop-color="#b8875e"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="14" y1="12" x2="26" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0d8b8"/>
      <stop offset="50%" stop-color="#c4956a"/>
      <stop offset="100%" stop-color="#8b6540"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow aura -->
  <ellipse cx="20" cy="16" rx="16" ry="14" fill="url(#glow)"/>
  <!-- Crystalline angular A — outer shape -->
  <path
    d="M 20 2 L 37 37 L 30 37 L 26 27 L 14 27 L 10 37 L 3 37 Z"
    fill="url(#arcGrad)"
  />
  <!-- Inner cutout — crystalline facet -->
  <path
    d="M 20 12 L 24.5 24 L 15.5 24 Z"
    fill="url(#innerGrad)"
    opacity="0.6"
  />
  <!-- Crossbar -->
  <rect x="12" y="24" width="16" height="3" rx="0.5" fill="url(#arcGrad)" opacity="0.9"/>
  <!-- Crystal highlight at apex -->
  <circle cx="20" cy="5" r="1.8" fill="#ffd700" opacity="0.7"/>
  <circle cx="20" cy="5" r="1" fill="#ffffff" opacity="0.5"/>
</svg>
