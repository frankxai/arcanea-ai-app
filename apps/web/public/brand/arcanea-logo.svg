<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="arcGrad" x1="4" y1="4" x2="36" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7fffd4"/>
      <stop offset="48%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#9b59ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#7fffd4" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#7fffd4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Glow aura behind the mark -->
  <ellipse cx="20" cy="18" rx="16" ry="14" fill="url(#glow)"/>
  <!-- Gate Portal A frame: outer arch minus inner arch via evenodd fill rule -->
  <!-- The path traces: up left outer pillar → arch over crown → down right outer pillar
       → step inward → up right inner pillar → arch over inner crown → down left inner pillar → close -->
  <path
    fill-rule="evenodd"
    d="M 4 37 L 4 18 Q 4 4 20 4 Q 36 4 36 18 L 36 37 L 30 37 L 30 19 Q 30 10 20 10 Q 10 10 10 19 L 10 37 Z"
    fill="url(#arcGrad)"
  />
  <!-- Crossbar: bridges the hollow at the A threshold -->
  <rect x="4" y="24" width="32" height="4" rx="2" fill="url(#arcGrad)"/>
  <!-- Crystal keystone: bright gem at the arch crown, half above / half in the frame -->
  <circle cx="20" cy="4" r="2.5" fill="#ffffff" opacity="0.75"/>
</svg>
